services:
  postgres:
    image: postgres:16-alpine
    container_name: dgm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-dgm_library}
      POSTGRES_USER: ${DB_USER:-dgm_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dgm_pass}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - dgm_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-dgm_user} -d ${DB_NAME:-dgm_library}']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dgm_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@dgm.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - '5050:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dgm_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: dgm_backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-dgm_library}
      DB_USER: ${DB_USER:-dgm_user}
      DB_PASSWORD: ${DB_PASSWORD:-dgm_pass}
      JWT_SECRET: ${JWT_SECRET:-super_secret_change_me_in_production}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-development_refresh_secret_change_me}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      PORT: 3000
    ports:
      - '3000:3000'
      - '9229:9229'
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dgm_network
    command: sh -c "npm run migration:run && npm run start:dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: dgm_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3000/api
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - dgm_network
    command: npm run dev -- --host

volumes:
  postgres_data:
  pgadmin_data:

networks:
  dgm_network:
    driver: bridge
